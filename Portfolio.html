<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>David Immanuel — Financial Analyst, Operator & Builder, Jakarta</title>
  <meta name="description" content="Financial analyst and operator with experience in financial modelling, investment analysis, demand planning, and product economics across banking, FMCG, and fintech. Based in Jakarta." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
/* ───────────────────────────────────────────────────────────────────────────
   David Immanuel — portfolio styles
   ─────────────────────────────────────────────────────────────────────────── */

:root {
  --sans:    "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --display: "Inter", ui-sans-serif, system-ui, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
  --accent: #1f7a6b;
}

:root[data-theme="dark"] {
  --bg:           #0a0a0a;
  --bg-elev:      #111111;
  --bg-card:      #131313;
  --bg-card-hov:  #181818;
  --bg-frame:     #0e0e0e;
  --border:       #1f1f1f;
  --border-soft:  #1a1a1a;
  --border-strong:#2a2a2a;
  --border-hov:   #353535;
  --text:         #ededed;
  --text-mid:     #b3b3b3;
  --text-muted:   #8a8a8a;
  --text-dim:     #5f5f5f;
  --accent-soft:  color-mix(in oklab, var(--accent) 18%, transparent);
  --accent-fg:    #f0f7f5;
  --shadow-card:  0 0 0 0 transparent;
  --grid-line:    rgba(255,255,255,.04);
}

:root[data-theme="light"] {
  --bg:           #fafaf9;
  --bg-elev:      #ffffff;
  --bg-card:      #ffffff;
  --bg-card-hov:  #f5f5f4;
  --bg-frame:     #f3f3f1;
  --border:       #e7e5e3;
  --border-soft:  #ececea;
  --border-strong:#d6d3d1;
  --border-hov:   #a8a29e;
  --text:         #18181b;
  --text-mid:     #3f3f46;
  --text-muted:   #57534e;
  --text-dim:     #a3a3a3;
  --accent-soft:  color-mix(in oklab, var(--accent) 12%, transparent);
  --accent-fg:    #ffffff;
  --shadow-card:  0 1px 2px rgba(0,0,0,.03);
  --grid-line:    rgba(0,0,0,.05);
}

:root[data-density="compact"] { --pad-section: 64px; --pad-card: 16px; --gap: 14px; --hero-pad: 80px; }
:root[data-density="regular"] { --pad-section: 96px; --pad-card: 22px; --gap: 18px; --hero-pad: 120px; }
:root[data-density="comfy"]   { --pad-section: 128px; --pad-card: 28px; --gap: 22px; --hero-pad: 160px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  line-height: 1.55;
  font-size: 15px;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

.muted { color: var(--text-muted); }
.accent { color: var(--accent); }
.small { font-size: 12px; }
.mono { font-family: var(--mono); font-feature-settings: "tnum"; letter-spacing: -0.005em; }
.dotsep { padding: 0 8px; color: var(--text-dim); }

/* ─── Layout ─── */
.root { min-height: 100vh; }
.main { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
.section { padding: var(--pad-section) 0; border-top: 1px solid var(--border); }
.section:first-child { border-top: none; }

/* ─── Nav ─── */
.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px;
  max-width: 1180px; margin: 0 auto;
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  backdrop-filter: blur(14px) saturate(150%);
  -webkit-backdrop-filter: blur(14px) saturate(150%);
  transition: border-color .25s, background .25s;
  border-bottom: 1px solid transparent;
}
.nav.is-scrolled { border-bottom-color: var(--border); }
.nav-brand { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.nav-mark {
  width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
  background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 6px;
  color: var(--text);
}
.nav-brand-name { font-weight: 600; letter-spacing: -0.01em; }
.nav-brand-divider { display: inline-block; width: 1px; height: 14px; background: var(--border-strong); margin: 0 4px; }
.nav-brand-role { font-size: 12px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  font-size: 13px; color: var(--text-muted);
  padding: 6px 12px; border-radius: 6px;
  transition: color .15s, background .15s;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.is-active { color: var(--text); background: var(--bg-card); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; padding: 7px 12px; border-radius: 7px;
  background: var(--text); color: var(--bg); font-weight: 500;
}
.nav-cta:hover { opacity: .92; }

@media (max-width: 880px) {
  .nav-brand-divider, .nav-brand-role, .nav-links { display: none; }
}

/* ─── Buttons ─── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  border: 1px solid transparent;
  transition: background .15s, color .15s, border-color .15s, transform .1s;
}
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text); border-color: var(--border-strong); }
.btn-ghost:hover { background: var(--bg-card); border-color: var(--border-hov); }

/* ─── Chips ─── */
.chip {
  display: inline-flex; align-items: center;
  font-family: var(--mono); font-size: 11px;
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-mid); letter-spacing: -0.005em;
}
.chip-mono {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border-strong);
}

/* ─── Section headers ─── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px;
}
.section-header-l { display: flex; align-items: center; gap: 14px; }
.section-num { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }
.section-line { display: inline-block; width: 28px; height: 1px; background: var(--border-strong); }
.section-label { font-size: 14px; font-weight: 500; color: var(--text); margin: 0; letter-spacing: -0.005em; }
.section-aside { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

/* ─── Hero ─── */
.hero {
  display: grid; grid-template-columns: 1fr 360px;
  gap: 64px; padding: var(--hero-pad) 0 var(--pad-section);
  align-items: end;
}
@media (max-width: 880px) { .hero { grid-template-columns: 1fr; gap: 40px; } }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  padding: 5px 10px; border: 1px solid var(--border-strong);
  border-radius: 100px; margin-bottom: 28px;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--accent-soft); }
  50%       { box-shadow: 0 0 0 6px color-mix(in oklab, var(--accent) 8%, transparent); }
}
.hero-name {
  font-family: var(--display);
  font-size: clamp(48px, 7vw, 84px);
  line-height: .98; margin: 0 0 14px;
  letter-spacing: -0.035em; font-weight: 500;
}
.hero-comma { color: var(--accent); }
.hero-headline {
  font-size: clamp(20px, 2.2vw, 26px);
  line-height: 1.35; letter-spacing: -0.012em;
  color: var(--text); margin: 0 0 16px;
  max-width: 32ch; text-wrap: pretty; font-weight: 400;
}
.hero-sub { font-size: 15px; color: var(--text-muted); max-width: 50ch; margin: 0 0 32px; line-height: 1.6; }
.hero-cta-row { display: flex; gap: 10px; align-items: center; margin-bottom: 32px; flex-wrap: wrap; }
.hero-meta {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; flex-wrap: wrap;
}

/* Hero ticker */
.hero-ticker {
  border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; background: var(--bg-card);
}
.ticker-label {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  margin-bottom: 16px; letter-spacing: 0.02em;
}
.ticker-tag {
  font-size: 9px; padding: 2px 6px;
  background: var(--accent); color: var(--accent-fg);
  border-radius: 3px; letter-spacing: 0.08em; font-weight: 600;
}
.ticker-rows { display: flex; flex-direction: column; gap: 12px; }
.ticker-row {
  padding: 8px 0; border-top: 1px solid var(--border-soft);
  transition: opacity .25s; opacity: .55; cursor: default;
}
.ticker-row.is-active { opacity: 1; }
.ticker-row:first-child { border-top: none; }
.ticker-value { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.ticker-num { font-family: var(--mono); font-size: 22px; letter-spacing: -0.015em; color: var(--text); }
.ticker-row.is-active .ticker-num { color: var(--accent); }
.ticker-unit { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.ticker-label-sm { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
.ticker-bar { height: 2px; background: var(--border-soft); margin-top: 8px; border-radius: 1px; overflow: hidden; }
.ticker-bar span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .25s; }
.ticker-row.is-active .ticker-bar span { width: 100%; transition: width 2.7s linear; }

/* ─── About ─── */
.about-grid { display: grid; grid-template-columns: 220px 1fr; gap: 48px; }
@media (max-width: 760px) { .about-grid { grid-template-columns: 1fr; gap: 24px; } }
.about-card {
  border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; background: var(--bg-card);
  display: flex; flex-direction: column; gap: 14px;
}
.about-card-kv { display: flex; flex-direction: column; gap: 2px; font-size: 13px; }
.about-card-kv > span:first-child {
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 2px;
}
.about-card-kv b { font-weight: 500; color: var(--text); }
.about-card-kv .muted { font-size: 12px; }
.about-prose p { font-size: 16px; line-height: 1.7; color: var(--text-mid); margin: 0 0 18px; text-wrap: pretty; max-width: 64ch; }
.about-prose p:last-child { margin-bottom: 0; }
.about-prose p:first-child { color: var(--text); }

/* ─── Experience ─── */
.exp-list { display: flex; flex-direction: column; }
.exp-card {
  display: grid;
  grid-template-columns: 40px 1fr;
  grid-template-rows: auto auto;
  gap: 0 8px;
}
.exp-card .exp-rail { grid-column: 1; grid-row: 1 / span 2; }
.exp-card .exp-head { grid-column: 2; grid-row: 1; }
.exp-card .exp-body { grid-column: 2; grid-row: 2; }
.exp-rail { display: flex; flex-direction: column; align-items: center; padding-top: 22px; }
.exp-node { width: 9px; height: 9px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-strong); flex-shrink: 0; }
.exp-node.is-now { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.exp-line { flex: 1; width: 1px; background: var(--border-strong); margin-top: 4px; }
.exp-line.is-last { background: transparent; }
.exp-head {
  background: none; border: none; padding: 18px 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  width: 100%; text-align: left;
  border-bottom: 1px solid var(--border-soft);
  transition: padding .2s;
}
.exp-card.is-open .exp-head { border-bottom-color: var(--border); }
.exp-head:hover .exp-company { color: var(--accent); }
.exp-period { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.02em; margin-bottom: 6px; }
.exp-company { font-size: 17px; font-weight: 500; color: var(--text); letter-spacing: -0.012em; transition: color .15s; margin-bottom: 2px; }
.exp-role { font-size: 13px; color: var(--text-muted); }
.exp-head-r { color: var(--text-muted); padding-top: 4px; }
.exp-body { padding: 4px 0 28px; }
.exp-scope { font-size: 14px; color: var(--text-mid); margin: 4px 0 18px; max-width: 70ch; line-height: 1.6; }
.exp-outcomes { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
.exp-outcomes li { display: grid; grid-template-columns: 32px 1fr; gap: 10px; font-size: 14px; color: var(--text-mid); line-height: 1.6; max-width: 72ch; }
.exp-num { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; padding-top: 4px; }
.exp-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px; }

/* ─── Projects ─── */
.proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 760px) { .proj-grid { grid-template-columns: 1fr; } }
.proj-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: var(--pad-card);
  text-align: left; cursor: pointer;
  display: flex; flex-direction: column; gap: 14px;
  transition: background .15s, border-color .15s, transform .15s;
  font-family: inherit; color: inherit;
  box-shadow: var(--shadow-card);
}
.proj-card:hover { background: var(--bg-card-hov); border-color: var(--border-hov); }
.proj-card-top { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 11px; }
.proj-kicker { color: var(--text-muted); }
.proj-tag {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  padding: 2px 7px; border-radius: 4px; background: var(--accent-soft); letter-spacing: 0.02em;
}
.proj-visual {
  border: 1px solid var(--border-soft); border-radius: 8px;
  background: var(--bg-frame); height: 140px;
  display: flex; align-items: stretch; overflow: hidden;
}
.viz { width: 100%; height: 100%; }
.proj-title { font-size: 19px; font-weight: 500; margin: 0; letter-spacing: -0.014em; color: var(--text); }
.proj-summary { font-size: 14px; color: var(--text-muted); margin: 6px 0 0; line-height: 1.55; }
.proj-card-foot {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  padding-top: 8px; border-top: 1px solid var(--border-soft); margin-top: auto;
}
.proj-card:hover .proj-card-foot { color: var(--accent); }

/* ─── Modal ─── */
.modal-scrim {
  position: fixed; inset: 0; z-index: 200;
  background: color-mix(in oklab, var(--bg) 85%, transparent);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 5vh 16px; overflow-y: auto;
  display: flex; align-items: flex-start; justify-content: center;
  animation: fade .18s ease-out;
}
@keyframes fade { from { opacity: 0; } }
.modal-sheet {
  width: 100%; max-width: 720px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px;
  animation: slideUp .2s ease-out;
  box-shadow: 0 24px 60px rgba(0,0,0,.4);
}
@keyframes slideUp { from { transform: translateY(8px); opacity: 0; } }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-kicker { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11px; }
.modal-close {
  background: none; border: 1px solid var(--border-strong);
  width: 28px; height: 28px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-muted);
}
.modal-close:hover { color: var(--text); border-color: var(--border-hov); }
.modal-title { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.022em; font-weight: 500; }
.modal-summary { font-size: 15px; color: var(--text-mid); margin: 0 0 22px; line-height: 1.6; max-width: 60ch; }
.modal-visual { height: 180px; border: 1px solid var(--border-soft); border-radius: 8px; background: var(--bg-frame); margin-bottom: 24px; overflow: hidden; }
.modal-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 24px; }
.modal-field { display: grid; grid-template-columns: 100px 1fr; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border-soft); }
.modal-field-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; padding-top: 2px; }
.modal-field-value { font-size: 14px; color: var(--text-mid); line-height: 1.65; }
.modal-stack { padding-top: 16px; border-top: 1px solid var(--border-soft); }
.modal-stack-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px; }
.modal-stack-chips { display: flex; flex-wrap: wrap; gap: 6px; }

/* ─── Pintas ─── */
.pintas-frame { border: 1px solid var(--border); border-radius: 14px; background: var(--bg-frame); overflow: hidden; }
.pintas-frame-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border-soft); background: var(--bg-card);
}
.pintas-mark {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  letter-spacing: 0.12em; font-weight: 600;
  padding: 3px 8px; border: 1px solid var(--accent-soft); border-radius: 4px; margin-right: 12px;
}
.pintas-frame-head-l { display: flex; align-items: center; gap: 0; font-size: 13px; }

/* Variant 1: pipeline */
.pntp { padding: 36px 28px 22px; }
.pntp-legs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 0; align-items: center; }
.pntp-legs > * { min-width: 0; }
.pntp-leg { text-align: center; padding: 18px 14px; border-radius: 10px; transition: background .2s; cursor: default; position: relative; }
.pntp-leg.is-hover { background: var(--bg-card); }
.pntp-leg-idx { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; margin-bottom: 6px; }
.pntp-leg-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.pntp-leg-detail { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; min-height: 36px; }
.pntp-node { position: relative; width: 32px; height: 32px; margin: 0 auto; }
.pntp-node-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--border-strong); transition: border-color .2s, box-shadow .2s; }
.pntp-leg.is-hover .pntp-node-ring { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
.pntp-node-dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); }
.pntp-link { display: flex; align-items: center; padding: 0 6px; align-self: center; }
.pntp-link-svg { width: 100%; height: 24px; }
.pntp-foot { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; border-top: 1px solid var(--border-soft); margin: 18px 0 0; padding: 18px 4px 6px; }
.pntp-foot-cell .muted { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
.pntp-foot-val { font-family: var(--mono); font-size: 16px; color: var(--text); letter-spacing: -0.01em; }
@media (max-width: 760px) { .pntp-legs { grid-template-columns: 1fr; } .pntp-link { display: none; } .pntp-foot { grid-template-columns: 1fr 1fr; } }

/* Variant 2: compare */
.pntc { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 0; padding: 30px 28px; align-items: stretch; }
.pntc-col { border: 1px solid var(--border-soft); border-radius: 10px; padding: 22px; background: var(--bg-card); }
.pntc-col-new { border-color: var(--accent-soft); }
.pntc-col-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.pntc-tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; }
.pntc-tag-old { background: var(--bg-frame); color: var(--text-dim); }
.pntc-tag-new { background: var(--accent-soft); color: var(--accent); }
.pntc-col-name { font-size: 14px; font-weight: 500; color: var(--text); }
.pntc-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); font-family: var(--mono); position: relative; }
.pntc-arrow-line { width: 1px; flex: 1; background: linear-gradient(to bottom, transparent, var(--accent), transparent); position: absolute; top: 20%; bottom: 20%; }
.pntc-arrow-tip { font-size: 18px; color: var(--accent); background: var(--bg-frame); padding: 6px; z-index: 1; }
.cmpr { display: grid; grid-template-columns: 110px 1fr 90px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-soft); }
.cmpr:last-of-type { border-bottom: none; }
.cmpr-l { font-size: 12px; color: var(--text-muted); }
.cmpr-bar { height: 6px; background: var(--bg-frame); border-radius: 3px; overflow: hidden; border: 1px solid var(--border-soft); }
.cmpr-fill { display: block; height: 100%; transition: width .6s ease-out; }
.cmpr-fill.cmpr-dim    { background: var(--text-dim); }
.cmpr-fill.cmpr-accent { background: var(--accent); }
.cmpr-v { font-family: var(--mono); font-size: 12px; text-align: right; color: var(--text-mid); }
.cmpr-v.cmpr-accent { color: var(--accent); }
.pntc-foot { font-size: 11px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft); line-height: 1.5; }
@media (max-width: 760px) { .pntc { grid-template-columns: 1fr; gap: 16px; padding: 22px; } .pntc-arrow { display: none; } }

/* Variant 3: ticker */
.pntt { padding: 0; }
.pntt-top { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border-soft); }
.pntt-top-cell { padding: 16px 18px; border-right: 1px solid var(--border-soft); font-size: 13px; }
.pntt-top-cell:last-child { border-right: none; }
.pntt-top-cell .muted { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
.pntt-stages { display: flex; flex-direction: column; padding: 24px 28px; gap: 4px; }
.pntt-stage { display: grid; grid-template-columns: 24px 1fr 70px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-soft); opacity: .5; transition: opacity .25s; }
.pntt-stage:last-child { border-bottom: none; }
.pntt-stage.is-done { opacity: 1; }
.pntt-stage-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-strong); margin-left: 4px; }
.pntt-stage.is-done .pntt-stage-dot { background: var(--accent); border-color: var(--accent); }
.pntt-stage.is-now .pntt-stage-dot { box-shadow: 0 0 0 4px var(--accent-soft); animation: pulse 1.4s ease-in-out infinite; }
.pntt-stage-name { font-size: 14px; color: var(--text); }
.pntt-stage-time { font-size: 12px; color: var(--text-muted); text-align: right; }
.pntt-bottom { display: grid; grid-template-columns: repeat(3, 1fr); padding: 22px 28px; border-top: 1px solid var(--border-soft); background: var(--bg-card); gap: 20px; }
.pntt-bottom-cell .muted { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
.pntt-big { font-size: 26px; letter-spacing: -0.018em; color: var(--text); }
@media (max-width: 760px) { .pntt-top { grid-template-columns: 1fr 1fr; } .pntt-bottom { grid-template-columns: 1fr; gap: 14px; } }

/* ─── Capabilities ─── */
.caps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
@media (max-width: 760px) { .caps-grid { grid-template-columns: 1fr; } }
.caps-col { border: 1px solid var(--border); border-radius: 12px; padding: 20px; background: var(--bg-card); }
.caps-col-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); }
.caps-col-num { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; }
.caps-col-label { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: -0.005em; }
.caps-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
.caps-list li { display: grid; grid-template-columns: 14px 1fr; gap: 8px; font-size: 13px; color: var(--text-mid); }
.caps-tick { font-family: var(--mono); font-size: 11px; color: var(--accent); }

/* ─── Contact ─── */
.contact-grid { display: grid; grid-template-columns: 1fr 360px; gap: 48px; align-items: start; }
@media (max-width: 760px) { .contact-grid { grid-template-columns: 1fr; gap: 32px; } }
.contact-headline { font-size: clamp(22px, 2.6vw, 30px); letter-spacing: -0.018em; font-weight: 500; margin: 0 0 10px; line-height: 1.25; text-wrap: pretty; max-width: 22ch; }
.contact-prose .muted { font-size: 14px; margin: 0 0 24px; }
.contact-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.contact-form { border: 1px solid var(--border); border-radius: 12px; padding: 18px; background: var(--bg-card); display: flex; flex-direction: column; gap: 14px; }
.contact-form-row { display: flex; flex-direction: column; gap: 6px; }
.contact-form-row label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; }
.contact-form-row input,
.contact-form-row textarea { background: var(--bg-frame); border: 1px solid var(--border-soft); border-radius: 7px; padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--text); resize: vertical; }
.contact-form-row input:focus,
.contact-form-row textarea:focus { outline: none; border-color: var(--accent); background: var(--bg-card-hov); }
.contact-send { align-self: flex-start; }

.site-foot { margin-top: var(--pad-section); padding-top: 24px; border-top: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; font-size: 11px; }

/* ─── Misc ─── */
::selection { background: var(--accent); color: var(--accent-fg); }
.root { animation: rootIn .35s ease-out; }
@keyframes rootIn { from { opacity: 0; transform: translateY(4px); } }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode')   setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && (
                <svg viewBox="0 0 14 14" aria-hidden="true" style={{ position:'absolute', top:6, left:6, width:13, height:13 }}>
                  <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
                        strokeLinecap="round" strokeLinejoin="round"
                        stroke={__twkIsLight(hero) ? 'rgba(0,0,0,.78)' : '#fff'} />
                </svg>
              )}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakToggle, TweakRadio, TweakColor });
  </script>

function ProjectModal({ project, onClose }) {
  React.useEffect(() => {
    if (!project) return;
    document.body.style.overflow = "hidden";
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", onKey); };
  }, [project, onClose]);

  if (!project) return null;

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal-sheet" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">

          {[["Problem", project.problem], ["Approach", project.approach], ["Outcome", project.outcome]].map(([label, val]) => (
            <div key={label} className="modal-field">
              <div className="modal-field-label">{label}</div>
              <div className="modal-field-value">{val}</div>
            </div>
          ))}
        </div>
        <div className="modal-stack">

      </div>
    </div>
  );
}

Object.assign(window, { Projects, ProjectModal, ProjectVisual });

  <!-- Pintas -->
  <script type="text/babel">
function Pintas({ data, variant }) {
  return (
    <section className="section" id="pintas">
      <SectionHeader number="04" label="Pintas — settlement flow"
        action={<span className="section-aside">Signature interaction · hover the rail</span>} />
      <div className="pintas-frame">
        <div className="pintas-frame-head">
          <div className="pintas-frame-head-l">
            <span className="pintas-mark">PINTAS</span>
            <span className="muted">B2B cross-border settlement — Indonesia → counterparty</span>
          </div>
          <div><span className="chip-mono">v0.4 · pilot</span></div>
        </div>
        {variant === "compare" && <PintasCompare data={data} />}
        {variant === "ticker"  && <PintasTicker  data={data} />}
        {(!variant || variant === "pipeline") && <PintasPipeline data={data} />}
      </div>
    </section>
  );
}

function PintasPipeline({ data }) {
  const [hover, setHover] = React.useState(null);
  return (
    <div className="pntp">
      <div className="pntp-legs">
        {data.legs.map((leg, i) => (
          <React.Fragment key={leg.id}>
            <div className={`pntp-leg ${hover === leg.id ? "is-hover" : ""}`}
                 onMouseEnter={() => setHover(leg.id)} onMouseLeave={() => setHover(null)}>
              <div className="pntp-leg-idx">{String(i + 1).padStart(2, "0")}</div>
              <div className="pntp-leg-label">{leg.label}</div>
              <div className="pntp-leg-detail">{leg.detail}</div>
              <div className="pntp-node">
                <span className="pntp-node-ring" />
                <span className="pntp-node-dot" />
              </div>
            </div>
            {i < data.legs.length - 1 && (
              <div className="pntp-link">
                <svg viewBox="0 0 200 24" preserveAspectRatio="none" className="pntp-link-svg">
                  <line x1="0" y1="12" x2="200" y2="12" stroke="var(--border-strong)" strokeWidth="1" />
                  {[0, 0.7, 1.4].map((begin, bi) => (
                    <circle key={bi} r="3" fill="var(--accent)" opacity={bi === 0 ? 1 : bi === 1 ? .55 : .3}>
                      <animate attributeName="cx" values="0;200" dur="2.2s" begin={`${begin}s`} repeatCount="indefinite" />
                      <animate attributeName="cy" values="12;12" dur="2.2s" begin={`${begin}s`} repeatCount="indefinite" />
                    </circle>
                  ))}
                </svg>
              </div>
            )}
          </React.Fragment>
        ))}
      </div>
      <div className="pntp-foot">
        <div className="pntp-foot-cell"><div className="muted">Settlement</div><div className="pntp-foot-val accent">~ minutes</div></div>
        <div className="pntp-foot-cell"><div className="muted">Fees</div><div className="pntp-foot-val">≈ {data.pintasRail.fee}</div></div>
        <div className="pntp-foot-cell"><div className="muted">FX uplift</div><div className="pntp-foot-val">{data.pintasRail.lift}</div></div>
        <div className="pntp-foot-cell"><div className="muted">Coverage</div><div className="pntp-foot-val">TransFi · Zero Hash</div></div>
      </div>
    </div>
  );
}

function PintasCompare({ data }) {
  return (
    <div className="pntc">
      <div className="pntc-col">
        <div className="pntc-col-head">
          <span className="pntc-tag pntc-tag-old">Legacy</span>
          <span className="pntc-col-name">SWIFT correspondent</span>
        </div>
        {[
          ["Time to settle", "3–5 days", 1.00, "dim"],
          ["Fee per transfer", data.swift.fee, 0.85, "dim"],
          ["FX spread", data.swift.lift, 0.95, "dim"],
        ].map(([label, value, pct, tone]) => (
          <div key={label} className="cmpr">
            <div className="cmpr-l">{label}</div>
            <div className="cmpr-bar"><span className={`cmpr-fill cmpr-${tone}`} style={{ width: (pct * 100) + "%" }} /></div>
            <div className={`cmpr-v`}>{value}</div>
          </div>
        ))}
        <div className="pntc-foot muted">Opaque routing through correspondent chain. Cost surfaces on reconciliation.</div>
      </div>
      <div className="pntc-arrow">
        <div className="pntc-arrow-line" />
        <div className="pntc-arrow-tip">→</div>
      </div>
      <div className="pntc-col pntc-col-new">
        <div className="pntc-col-head">
          <span className="pntc-tag pntc-tag-new">Pintas rail</span>
          <span className="pntc-col-name">Stablecoin settlement</span>
        </div>
        {[
          ["Time to settle", "minutes", 0.04, "accent"],
          ["Fee per transfer", data.pintasRail.fee, 0.18, "accent"],
          ["FX spread", data.pintasRail.lift, 0.30, "accent"],
        ].map(([label, value, pct, tone]) => (
          <div key={label} className="cmpr">
            <div className="cmpr-l">{label}</div>
            <div className="cmpr-bar"><span className={`cmpr-fill cmpr-${tone}`} style={{ width: (pct * 100) + "%" }} /></div>
            <div className={`cmpr-v cmpr-${tone}`}>{value}</div>
          </div>
        ))}
        <div className="pntc-foot muted">USD on-ramp → USDC/USDT corridor → USD off-ramp. Receiver sees USD only.</div>
      </div>
    </div>
  );
}

function PintasTicker({ data }) {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setT((x) => x + 1), 1000);
    return () => clearInterval(id);
  }, []);

  const cycle = 12;
  const phase = t % cycle;
  const stage = phase < 2 ? 0 : phase < 8 ? 1 : phase < 11 ? 2 : 3;
  const stageNames = ["Initiated", "Stablecoin leg", "Off-ramp", "Settled"];
  const elapsed = (phase + 1).toFixed(0);

  return (
    <div className="pntt">
      <div className="pntt-top">
        {[
          ["Reference",  <span className="mono">PTX-{(10240 + Math.floor(t / cycle)).toString().padStart(6, "0")}</span>],
          ["Sender",     "Indonesian exporter · USD"],
          ["Receiver",   "Counterparty bank · USD"],
          ["Notional",   <span className="mono">USD 248,500.00</span>],
        ].map(([label, val]) => (
          <div key={label} className="pntt-top-cell">
            <div className="muted">{label}</div>
            <div>{val}</div>
          </div>
        ))}
      </div>
      <div className="pntt-stages">
        {stageNames.map((name, i) => (
          <div key={i} className={`pntt-stage ${i <= stage ? "is-done" : ""} ${i === stage ? "is-now" : ""}`}>
            <span className="pntt-stage-dot" />
            <span className="pntt-stage-name">{name}</span>
            <span className="pntt-stage-time mono">{i <= stage ? "00:0" + Math.min(9, i * 3) : "—"}</span>
          </div>
        ))}
      </div>
      <div className="pntt-bottom">
        <div className="pntt-bottom-cell">
          <div className="muted">Pintas — elapsed</div>
          <div className="pntt-big accent mono">00:{elapsed.padStart(2, "0")}</div>
        </div>
        <div className="pntt-bottom-cell">
          <div className="muted">SWIFT equivalent</div>
          <div className="pntt-big mono">{((phase + 1) * 0.05).toFixed(2)}d <span className="muted small">/ ~3.5d typical</span></div>
        </div>
        <div className="pntt-bottom-cell">
          <div className="muted">Fee delta</div>
          <div className="pntt-big mono accent">−82%</div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Pintas });
  </script>

  <script type="text/babel">
function Capabilities({ data }) {
  const cols = [data.strategy, data.build, data.operating];
  return (
    <section className="section" id="capabilities">
      <SectionHeader number="05" label="Capabilities" />
      <div className="caps-grid">
        {cols.map((c, i) => (
          <div key={i} className="caps-col">
            <div className="caps-col-head">
              <span className="caps-col-num">{String(i + 1).padStart(2, "0")}</span>
              <span className="caps-col-label">{c.label}</span>
            </div>
            <ul className="caps-list">
              {c.items.map((it, j) => (
                <li key={j}><span className="caps-tick">/</span><span>{it}</span></li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </section>
  );
}

function Contact({ person }) {
  const [copied, setCopied] = React.useState(false);
  const [name, setName] = React.useState("");
  const [from, setFrom] = React.useState("");
  const [msg, setMsg]   = React.useState("");
  const [sent, setSent] = React.useState(false);

  const copy = () => {
    navigator.clipboard?.writeText(person.email);
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  };

  const onSubmit = (e) => {
    e.preventDefault();
    const body    = encodeURIComponent(`${msg}\n\n— ${name}\n${from}`);
    const subject = encodeURIComponent(`Hello from ${name || "your site"}`);
    window.location.href = `mailto:${person.email}?subject=${subject}&body=${body}`;
    setSent(true);
  };

  return (
    <section className="section" id="contact">
      <SectionHeader number="06" label="Contact" />
      <div className="contact-grid">
        <div className="contact-prose">
          <h3 className="contact-headline">Open to financial analyst, investment, senior operator, and founder-track conversations.</h3>
          <p className="muted">Best reached over email. I read everything; I reply to most.</p>
          <div className="contact-actions">
            <button className="btn btn-primary" onClick={copy}>
              {copied ? "Copied" : person.email}
              {!copied && <ArrowIcon />}
            </button>
            <a className="btn btn-ghost" href={person.linkedin} target="_blank" rel="noreferrer">LinkedIn</a>
            <a className="btn btn-ghost" href={person.github}   target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </div>

        <form className="contact-form" onSubmit={onSubmit}>
          <div className="contact-form-row">
            <label>Name</label>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Your name" />
          </div>
          <div className="contact-form-row">
            <label>Email</label>
            <input type="email" value={from} onChange={(e) => setFrom(e.target.value)} placeholder="you@company.com" />
          </div>
          <div className="contact-form-row">
            <label>Message</label>
            <textarea rows="4" value={msg} onChange={(e) => setMsg(e.target.value)} placeholder="What you're working on. Short is fine." />
          </div>
          <button className="btn btn-primary contact-send" type="submit">
            {sent ? "Opening mail…" : "Send"} <ArrowIcon />
          </button>
          <div className="muted small">Falls back to mailto. No tracking, no form backend.</div>
        </form>
      </div>

      <footer className="site-foot">
        <div className="muted small">© {new Date().getFullYear()} {person.name} · {person.location}</div>
        <div className="muted small mono">last build · {new Date().toLocaleDateString("en-CA")}</div>
      </footer>
    </section>
  );
}

Object.assign(window, { Capabilities, Contact });
  </script>

  <!-- App root -->
  <script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#1f7a6b",
  "type": "inter",
  "dark": true,
  "density": "regular",
  "pintasVariant": "pipeline"
}/*EDITMODE-END*/;

const ACCENT_PRESETS = ["#1f7a6b", "#d97706", "#b45309", "#8b6f3f"];

const TYPE_PRESETS = {
  inter:   { sans: '"Inter", ui-sans-serif, system-ui, sans-serif',         display: '"Inter", ui-sans-serif, system-ui, sans-serif' },
  geist:   { sans: '"Geist", "Inter", ui-sans-serif, system-ui, sans-serif', display: '"Geist", "Inter", ui-sans-serif, system-ui, sans-serif' },
  ibmplex: { sans: '"IBM Plex Sans", ui-sans-serif, system-ui, sans-serif',  display: '"IBM Plex Sans", ui-sans-serif, system-ui, sans-serif' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const C = window.PORTFOLIO_CONTENT;
  const [openProject, setOpenProject] = React.useState(null);

  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", t.accent);
    root.dataset.theme   = t.dark ? "dark" : "light";
    root.dataset.density = t.density;
    const fonts = TYPE_PRESETS[t.type] || TYPE_PRESETS.inter;
    root.style.setProperty("--sans",    fonts.sans);
    root.style.setProperty("--display", fonts.display);
  }, [t.accent, t.dark, t.density, t.type]);

  const project = C.projects.find((p) => p.id === openProject);

  return (
    <div className="root">
      <Nav person={C.person} />
      <main className="main">
        <Hero     person={C.person} metrics={C.metrics} />
        <About    paragraphs={C.about} />
        <Experience items={C.experience} />
        <Projects   items={C.projects} onOpen={setOpenProject} />
        <Pintas     data={C.pintas} variant={t.pintasVariant} />
        <Capabilities data={C.capabilities} />
        <Contact    person={C.person} />
      </main>

      <ProjectModal project={project} onClose={() => setOpenProject(null)} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakColor  label="Accent" value={t.accent} options={ACCENT_PRESETS} onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Typography" />
        <TweakRadio  label="Family"  value={t.type}    options={["inter", "geist", "ibmplex"]} onChange={(v) => setTweak('type', v)} />
        <TweakRadio  label="Density" value={t.density} options={["compact", "regular", "comfy"]} onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Pintas — signature interaction" />
        <TweakRadio  label="Variant" value={t.pintasVariant} options={["pipeline", "compare", "ticker"]} onChange={(v) => setTweak('pintasVariant', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
